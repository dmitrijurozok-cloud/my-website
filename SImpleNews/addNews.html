<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/addNews.css">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="header-container">
            <a href="#"><img src="public/logo.png" alt=""></a>
            <nav>
                <div>Новости</div>
                <div>Финансы</div>
                <div>Недвижимость</div>
                <div>Спорт</div>
                <div>Афиша</div>
                <div>Магазины</div>
                <div>Работа</div>
                <div>ТВ-Программа</div>
                <div>Почта</div>
                <div>Погода</div>
            </nav>
            <div>
                <img src="public/search.png" alt="">
                <img src="public/user-logo.png" alt="">
                <img src="public/add.png" alt="">
            </div>
        </div>
    </header>

    <main>
        <form action="#" method="post" class="full-news-container">
            <div class="info-container">
                Категория:
                <select>
                    <option value="property">Недвижимость</option>
                </select>
            </div>
            <input type="text" placeholder="Текст заголовка">
            <div class="image-container">
                <img src="public/cross.png" alt="">
            </div>
            <div class="full-text">
                <input type="text" placeholder="Основной текст новости">
            </div>
            <div class="button-container">
                    <button>Отмена</button>
                    <button class="add-button">Оставить комментарий</button>
            </div>
        </form>
    </main>
</body>
</html>
